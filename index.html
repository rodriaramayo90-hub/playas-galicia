<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mejores playas de Galicia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>🏖️ Ranking diario de las mejores playas de Galicia</h1>

<div class="filtros">

<button onclick="obtenerUbicacionGPS()">
📍 Usar mi ubicación
</button>

<input 
type="number" 
id="codigoPostal"
placeholder="Código postal">

<button onclick="buscarCodigoPostal(document.getElementById('codigoPostal').value)">
Buscar
</button>


<select onchange="cambiarDistancia(this.value)">
<option value="">Todas las distancias</option>
<option value="10">Menos de 10 km</option>
<option value="25">Menos de 25 km</option>
<option value="50">Menos de 50 km</option>
<option value="100">Menos de 100 km</option>
</select>

</div>
    
<div class="contenedor">

<div class="tabla-scroll">

<table>
<thead>
    <tr>
        <th>#</th>
        <th>Playa</th>
        <th>Distancia</th>
        <th>Cielo</th>
        <th>T. Máx</th>
        <th>T. Playa</th>
        <th>Viento</th>
        <th>Lluvia</th>
        <th>Agua</th>
        <th>Oleaje</th>
        <th>Estado</th>
        <th>Puntos</th>
        <th>Explicación</th>
    </tr>
</thead>

<tbody id="ranking">

</tbody>

</table>

</div>
</div>

    <script src="app.js"></script>

</body>
</html>
