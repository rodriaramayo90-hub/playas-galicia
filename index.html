<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mejores playas de Galicia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>🏖️ Ranking diario de las mejores playas de Galicia</h1>

<div class="filtros">

<button onclick="obtenerUbicacionGPS()">
📍 Usar mi ubicación
</button>

<input 
type="number" 
id="codigoPostal"
placeholder="Código postal">

<button onclick="buscarCodigoPostal(document.getElementById('codigoPostal').value)">
Buscar
</button>


<label>
Distancia máxima (km):
<input 
type="number" 
min="0"
step="1"
placeholder="Ej: 50"
oninput="cambiarDistancia(this.value)">
</label>

<button onclick="toggleDetalles()">
Ver detalles
</button>
    
</div>
    
<div class="contenedor">

<div class="tabla-scroll">

<table>
<thead>
    <tr>
        <th>#</th>
        <th>Playa</th>
        <th>Distancia</th>
        <th>Cielo</th>
        <th class="detalle oculto">T. Máx</th>
        <th>T. Playa</th>
        <th class="detalle oculto">Viento</th>
        <th class="detalle oculto">Lluvia</th>
        <th class="detalle oculto">Agua</th>
        <th class="detalle oculto">Oleaje</th>
        <th class="col-estado">Estado</th>
        <th class="detalle oculto">Puntaje</th>
        <th class="col-explicacion">Explicación</th>
    </tr>
</thead>

<tbody id="ranking">

</tbody>

</table>

</div>
</div>

    <script src="app.js"></script>

</body>
</html>
